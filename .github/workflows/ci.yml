name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: be
        run: npm ci

      - name: Install frontend dependencies
        working-directory: fe
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint backend
        run: npm --prefix be run lint

      - name: Lint frontend
        run: npm --prefix fe run lint

      - name: Typecheck backend
        run: npm --prefix be run typecheck

      - name: Typecheck frontend
        run: npm --prefix fe run typecheck

      - name: Test backend
        run: npm --prefix be run test:run

      - name: Test frontend
        run: npm --prefix fe run test

      - name: Build backend
        run: npm --prefix be run build

      - name: Build frontend
        run: npm --prefix fe run build

      - name: Run e2e
        run: npm run e2e
